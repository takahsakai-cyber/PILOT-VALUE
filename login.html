<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>(function(){var t=localStorage.getItem('pv-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}());</script>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ログイン — PILOT VALUE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0c0f;color:#e8edf2;font-family:Inter,'Noto Sans JP',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(245,200,66,.05) 0%,transparent 70%);pointer-events:none}
    [data-theme="light"] body{background:#f3f5f8;color:#0f172a}
    .auth-card{background:rgba(17,22,32,.95);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;position:relative}
    [data-theme="light"] .auth-card{background:#fff;border-color:rgba(0,0,0,.09);box-shadow:0 8px 40px rgba(0,0,0,.12)}
    .auth-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:11px;color:#e8edf2;font-size:.9rem;outline:none;transition:border-color .2s,background .2s;font-family:inherit}
    .auth-input:focus{border-color:rgba(245,200,66,.5);background:rgba(255,255,255,.07)}
    .auth-input::placeholder{color:#6b7d93}
    [data-theme="light"] .auth-input{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.12);color:#0f172a}
    [data-theme="light"] .auth-input:focus{border-color:rgba(161,114,0,.4);background:#fff}
    .btn-login{width:100%;padding:14px;background:#e8edf2;color:#0a0c0f;border:none;border-radius:11px;font-weight:700;font-size:.92rem;cursor:pointer;transition:background .2s,transform .15s,opacity .2s;font-family:inherit}
    .btn-login:hover:not(:disabled){background:#fff;transform:translateY(-1px)}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    [data-theme="light"] .btn-login{background:#0f172a;color:#fff}
    [data-theme="light"] .btn-login:hover:not(:disabled){background:#1e293b}
    .btn-google{width:100%;padding:13px;background:rgba(255,255,255,.06);color:#e8edf2;border:1px solid rgba(255,255,255,.11);border-radius:11px;font-weight:600;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;font-family:inherit}
    .btn-google:hover{background:rgba(255,255,255,.11)}
    [data-theme="light"] .btn-google{background:rgba(0,0,0,.04);color:#0f172a;border-color:rgba(0,0,0,.12)}
    .theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.07);color:#e8edf2;border:1px solid rgba(255,255,255,.12);cursor:pointer;transition:background .2s}
    .theme-toggle:hover{background:rgba(255,255,255,.13)}
    [data-theme="light"] .theme-toggle{background:rgba(0,0,0,.06);color:#0f172a;border-color:rgba(0,0,0,.13)}
    .divider{display:flex;align-items:center;gap:12px;color:#6b7d93;font-size:.78rem;margin:4px 0}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
    [data-theme="light"] .divider::before,[data-theme="light"] .divider::after{background:rgba(0,0,0,.08)}
    .error-msg{color:#f87171;font-size:.8rem;padding:8px 12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;display:none}
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3XYF69VQ3X"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3XYF69VQ3X');
</script>
</head>
<body>
  <div style="position:fixed;top:16px;right:16px;z-index:10">
    <button id="theme-toggle" class="theme-toggle" aria-label="テーマ切替"></button>
  </div>
  <div style="position:fixed;top:16px;left:16px;z-index:10">
    <a href="index.html" style="font-size:.82rem;color:#6b7d93;text-decoration:none;display:flex;align-items:center;gap:5px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
      トップへ
    </a>
  </div>

  <div class="auth-card">
    <div style="text-align:center;margin-bottom:32px">
      <a href="index.html"><img src="baland_ass/ロゴイメージ.png" alt="PILOT VALUE" style="height:34px;margin:0 auto"/></a>
      <div style="font-size:.75rem;color:#6b7d93;margin-top:8px;letter-spacing:.04em">パイロットのための年収情報プラットフォーム</div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div style="display:flex;flex-direction:column;gap:11px;margin-bottom:16px">
        <input class="auth-input" type="email" id="email" placeholder="Email" autocomplete="email" required/>
        <input class="auth-input" type="password" id="password" placeholder="Password" autocomplete="current-password" required/>
        <div class="error-msg" id="login-error">メールアドレスまたはパスワードが正しくありません</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button type="submit" class="btn-login" id="login-btn">ログイン</button>
        <div class="divider">または</div>
        <button type="button" class="btn-google" onclick="handleGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Googleでログイン
        </button>
      </div>
    </form>

    <div style="text-align:center;margin-top:24px;font-size:.84rem;color:#6b7d93">
      アカウントをお持ちでない方は
      <a href="signup.html" style="color:#f5c842;font-weight:700;text-decoration:none">新規登録</a>
    </div>
  </div>

  <script>
    const SB_URL = 'https://vzgmnkrggrwtsrpqndsm.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Z21ua3JnZ3J3dHNycHFuZHNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzkwOTcsImV4cCI6MjA5MDAxNTA5N30.wE4cJbqeYGCgn5ZvHd80hYWgQuySKvOMJMbsJWOvmtw';
    const sb = supabase.createClient(SB_URL, SB_KEY, {
      auth: { flowType: 'pkce' }
    });

    const SUN = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const MOON = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('pv-theme',t);const b=document.getElementById('theme-toggle');if(b)b.innerHTML=t==='dark'?SUN:MOON;}
    applyTheme(localStorage.getItem('pv-theme')||'dark');
    document.getElementById('theme-toggle').addEventListener('click',function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});

    function getRedirect(){ return new URLSearchParams(location.search).get('redirect')||'profile.html'; }

    // 既にログイン済みならリダイレクト
    (async function(){
      const { data:{ session } } = await sb.auth.getSession();
      if(session) window.location.href = getRedirect();
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');
      errEl.style.display = 'none';
      btn.textContent = 'ログイン中…'; btn.disabled = true;

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.style.display = 'block';
        btn.textContent = 'ログイン'; btn.disabled = false;
        return;
      }

      // プロフィール取得（プロフィール未作成でも必ずpv_userを保存）
      const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
      const userData = profile
        ? {...profile, email: data.user.email}
        : { id: data.user.id, email: data.user.email, name: data.user.email.split('@')[0] };
      localStorage.setItem('pv_user', JSON.stringify(userData));

      // 口コミ投稿済み確認 → unlock
      const { data: revs } = await sb.from('reviews').select('id').eq('user_id', data.user.id).limit(1);
      if (revs?.length) localStorage.setItem('pv_unlock_expiry', (Date.now()+30*24*60*60*1000).toString());

      window.location.href = getRedirect();
    }

    async function handleGoogle() {
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://pilot-value.com/auth-callback.html' }
      });
    }
  </script>
</body>
</html>
