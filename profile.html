<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <script>(function(){var t=localStorage.getItem('pv-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}());</script>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>マイページ — PILOT VALUE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0c0f;color:#e8edf2;font-family:Inter,'Noto Sans JP',sans-serif;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(245,200,66,.06) 0%,transparent 65%);pointer-events:none;z-index:0}
    [data-theme="light"] body{background:#f3f5f8;color:#0f172a}
    nav{position:sticky;top:0;z-index:200;background:rgba(10,12,15,.96);border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(20px)}
    [data-theme="light"] nav{background:rgba(243,245,248,.97);border-bottom-color:rgba(0,0,0,.08)}
    .nav-inner{max-width:700px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
    .btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;background:rgba(255,255,255,.07);color:#e8edf2;border:1px solid rgba(255,255,255,.12);cursor:pointer;font-size:.83rem;font-weight:600;text-decoration:none;transition:background .2s;font-family:inherit}
    .btn-ghost:hover{background:rgba(255,255,255,.12)}
    [data-theme="light"] .btn-ghost{background:rgba(0,0,0,.05);color:#0f172a;border-color:rgba(0,0,0,.12)}
    .theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.07);color:#e8edf2;border:1px solid rgba(255,255,255,.12);cursor:pointer;transition:background .2s;flex-shrink:0}
    .theme-toggle:hover{background:rgba(255,255,255,.13)}
    [data-theme="light"] .theme-toggle{background:rgba(0,0,0,.06);color:#0f172a;border-color:rgba(0,0,0,.13)}
    .glass{background:rgba(17,22,32,.7);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px}
    [data-theme="light"] .glass{background:#fff;border-color:rgba(0,0,0,.09);box-shadow:0 2px 14px rgba(0,0,0,.07)}
    .avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#f5c842,#f97316);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#000;flex-shrink:0}
    .info-row{display:grid;grid-template-columns:120px 1fr;gap:8px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:center}
    .info-row:last-child{border-bottom:none}
    [data-theme="light"] .info-row{border-bottom-color:rgba(0,0,0,.06)}
    .info-label{font-size:.75rem;color:#6b7d93;font-weight:600;letter-spacing:.03em}
    .info-value{font-size:.9rem;font-weight:600}
    .pos-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-size:.78rem;font-weight:700;letter-spacing:.04em}
    .pos-captain{background:rgba(245,200,66,.12);color:#f5c842;border:1px solid rgba(245,200,66,.25)}
    .pos-fo{background:rgba(99,179,237,.1);color:#63b3ed;border:1px solid rgba(99,179,237,.2)}
    .pos-cadet{background:rgba(154,230,180,.1);color:#68d391;border:1px solid rgba(154,230,180,.2)}
    .unlock-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;font-size:.78rem;font-weight:600}
    .unlock-active{background:rgba(72,199,142,.1);color:#48c78e;border:1px solid rgba(72,199,142,.25)}
    .unlock-inactive{background:rgba(255,255,255,.05);color:#6b7d93;border:1px solid rgba(255,255,255,.1)}
    [data-theme="light"] .unlock-inactive{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1)}
    .auth-input{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#e8edf2;font-size:.87rem;outline:none;transition:border-color .2s;font-family:inherit}
    .auth-input:focus{border-color:rgba(245,200,66,.5)}
    .auth-input::placeholder{color:#6b7d93}
    [data-theme="light"] .auth-input{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.12);color:#0f172a}
    select.auth-input option{background:#111620;color:#e8edf2}
    .radio-group{display:flex;gap:7px;flex-wrap:wrap}
    .radio-chip input{display:none}
    .radio-chip label{display:inline-flex;align-items:center;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);font-size:.82rem;cursor:pointer;transition:border-color .2s,background .2s;color:#9ca3af}
    .radio-chip input:checked+label{border-color:rgba(245,200,66,.5);background:rgba(245,200,66,.08);color:#f5c842;font-weight:600}
    [data-theme="light"] .radio-chip label{border-color:rgba(0,0,0,.12);color:#64748b}
    [data-theme="light"] .radio-chip input:checked+label{border-color:rgba(161,114,0,.4);background:rgba(161,114,0,.07);color:#a07200}
    .field-label{font-size:.74rem;color:#9ca3af;margin-bottom:4px;font-weight:600;letter-spacing:.03em}
    [data-theme="light"] .field-label{color:#64748b}
    .btn-save{padding:10px 24px;background:linear-gradient(135deg,#f5c842,#f97316);color:#000;border:none;border-radius:10px;font-weight:700;font-size:.88rem;cursor:pointer;transition:opacity .2s;font-family:inherit}
    .btn-save:hover{opacity:.88}
    .btn-cancel{padding:10px 20px;background:rgba(255,255,255,.06);color:#9ca3af;border:1px solid rgba(255,255,255,.1);border-radius:10px;font-weight:600;font-size:.88rem;cursor:pointer;transition:background .2s;font-family:inherit}
    .btn-cancel:hover{background:rgba(255,255,255,.1);color:#e8edf2}
    .btn-logout{padding:9px 20px;background:rgba(248,113,113,.08);color:#f87171;border:1px solid rgba(248,113,113,.2);border-radius:10px;font-weight:600;font-size:.84rem;cursor:pointer;transition:background .2s;font-family:inherit}
    .btn-logout:hover{background:rgba(248,113,113,.14)}
    .success-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111620;border:1px solid rgba(72,199,142,.3);border-radius:12px;padding:12px 24px;font-size:.85rem;font-weight:600;color:#48c78e;display:none;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .skeleton{background:rgba(255,255,255,.06);border-radius:6px;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
    [data-theme="light"] .skeleton{background:rgba(0,0,0,.08)}
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3XYF69VQ3X"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3XYF69VQ3X');
</script>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html"><img src="baland_ass/ロゴイメージ.png" alt="PILOT VALUE" style="height:30px"/></a>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="theme-toggle" class="theme-toggle" aria-label="テーマ切替"></button>
        <a href="index.html" class="btn-ghost">← トップ</a>
      </div>
    </div>
  </nav>

  <main style="max-width:700px;margin:0 auto;padding:36px 24px 80px;position:relative;z-index:1">

    <!-- Profile card -->
    <div class="glass" id="profile-card">
      <div style="display:flex;align-items:center;gap:18px;margin-bottom:24px;flex-wrap:wrap">
        <div class="avatar" id="avatar-letter">…</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:1.25rem;font-weight:800;margin-bottom:4px" id="display-name">
            <div class="skeleton" style="width:140px;height:22px"></div>
          </div>
          <div id="display-pos-badge"></div>
          <div style="font-size:.78rem;color:#6b7d93;margin-top:4px" id="display-email">
            <div class="skeleton" style="width:180px;height:14px;margin-top:6px"></div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <button class="btn-ghost" onclick="startEdit()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            編集
          </button>
          <button class="btn-logout" onclick="handleLogout()">ログアウト</button>
        </div>
      </div>

      <div style="margin-bottom:20px">
        <span class="unlock-badge unlock-inactive" id="unlock-status">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          口コミ未投稿
        </span>
      </div>
      <div id="unlock-cta" style="display:none;background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.2);border-radius:12px;padding:16px 18px;margin-bottom:20px">
        <div style="font-size:.85rem;font-weight:700;color:#f5c842;margin-bottom:6px">口コミを投稿して年収データを解放しよう</div>
        <div style="font-size:.78rem;color:#9ca3af;line-height:1.6;margin-bottom:12px">あなたの実際の年収・待遇を匿名で投稿すると、他のパイロットが投稿した全ての年収口コミが30日間見放題になります。</div>
        <a href="submit-review.html" style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#f5c842;color:#000;border-radius:9px;font-size:.82rem;font-weight:700;text-decoration:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          口コミを投稿する
        </a>
      </div>

      <div id="info-rows">
        <div class="info-row"><div class="info-label">氏名</div><div class="info-value" id="v-name">—</div></div>
        <div class="info-row"><div class="info-label">性別</div><div class="info-value" id="v-gender">—</div></div>
        <div class="info-row"><div class="info-label">生年月日</div><div class="info-value" id="v-birth">—</div></div>
        <div class="info-row"><div class="info-label">居住国</div><div class="info-value" id="v-country">—</div></div>
        <div class="info-row"><div class="info-label">在籍企業</div><div class="info-value" id="v-company">—</div></div>
        <div class="info-row"><div class="info-label">職位</div><div class="info-value" id="v-position">—</div></div>
        <div class="info-row"><div class="info-label">登録日</div><div class="info-value" id="v-joined">—</div></div>
      </div>
    </div>

    <!-- Edit form -->
    <div class="glass" id="edit-card" style="display:none;margin-top:20px">
      <div style="font-size:1rem;font-weight:700;margin-bottom:20px">プロフィール編集</div>
      <form onsubmit="saveEdit(event)" novalidate>
        <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:20px">
          <div><div class="field-label">氏名</div><input class="auth-input" type="text" id="e-name" required/></div>
          <div>
            <div class="field-label">性別</div>
            <div class="radio-group">
              <div class="radio-chip"><input type="radio" name="e-gender" id="eg-male" value="male"/><label for="eg-male">男性</label></div>
              <div class="radio-chip"><input type="radio" name="e-gender" id="eg-female" value="female"/><label for="eg-female">女性</label></div>
              <div class="radio-chip"><input type="radio" name="e-gender" id="eg-other" value="other"/><label for="eg-other">その他</label></div>
            </div>
          </div>
          <div><div class="field-label">生年月日</div><input class="auth-input" type="date" id="e-birth" style="color-scheme:dark"/></div>
          <div>
            <div class="field-label">居住国</div>
            <select class="auth-input" id="e-country">
              <option value="">選択</option>
              <option>日本</option><option>アメリカ</option><option>UAE</option>
              <option>シンガポール</option><option>香港</option><option>イギリス</option>
              <option>ドイツ</option><option>フランス</option><option>オーストラリア</option>
              <option>カナダ</option><option>韓国</option><option>中国</option><option>その他</option>
            </select>
          </div>
          <div><div class="field-label">在籍企業</div><input class="auth-input" type="text" id="e-company"/></div>
          <div>
            <div class="field-label">職位</div>
            <div class="radio-group">
              <div class="radio-chip"><input type="radio" name="e-pos" id="ep-cap" value="captain"/><label for="ep-cap">機長</label></div>
              <div class="radio-chip"><input type="radio" name="e-pos" id="ep-fo" value="fo"/><label for="ep-fo">副操縦士</label></div>
              <div class="radio-chip"><input type="radio" name="e-pos" id="ep-cad" value="cadet"/><label for="ep-cad">訓練生</label></div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button type="submit" class="btn-save">保存する</button>
          <button type="button" class="btn-cancel" onclick="cancelEdit()">キャンセル</button>
        </div>
      </form>
    </div>

    <!-- My reviews -->
    <div class="glass" id="my-reviews-card" style="margin-top:20px">
      <div style="font-size:.92rem;font-weight:700;margin-bottom:16px">投稿した口コミ</div>
      <div id="my-reviews-list" style="font-size:.84rem;color:#6b7d93">読み込み中…</div>
    </div>
  </main>

  <div class="success-toast" id="toast">プロフィールを保存しました ✓</div>

  <script>
    const SB_URL = 'https://vzgmnkrggrwtsrpqndsm.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Z21ua3JnZ3J3dHNycHFuZHNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzkwOTcsImV4cCI6MjA5MDAxNTA5N30.wE4cJbqeYGCgn5ZvHd80hYWgQuySKvOMJMbsJWOvmtw';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const SUN = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const MOON = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('pv-theme',t);const b=document.getElementById('theme-toggle');if(b)b.innerHTML=t==='dark'?SUN:MOON;}
    applyTheme(localStorage.getItem('pv-theme')||'dark');
    document.getElementById('theme-toggle').addEventListener('click',function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});

    const POS_LABEL = {captain:'機長', fo:'副操縦士', cadet:'訓練生'};
    const POS_CLASS = {captain:'pos-captain', fo:'pos-fo', cadet:'pos-cadet'};
    const GENDER_LABEL = {male:'男性', female:'女性', other:'その他'};

    let currentUser = null;
    let profile     = null;

    async function init() {
      const { data:{ session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html?redirect=profile.html'; return; }
      currentUser = session.user;

      // プロフィール取得
      const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      profile = p || {};
      renderProfile();

      // 口コミ取得
      const { data: revs } = await sb.from('reviews').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false});
      renderReviews(revs || []);

      // unlock確認
      if (revs && revs.length > 0) {
        const expiry = Date.now() + 30*24*60*60*1000;
        localStorage.setItem('pv_unlock_expiry', expiry.toString());
        const d = new Date(expiry).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
        const unEl = document.getElementById('unlock-status');
        unEl.className = 'unlock-badge unlock-active';
        unEl.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg> 口コミ解放中（${d}まで）`;
      } else {
        document.getElementById('unlock-cta').style.display = 'block';
      }
    }

    function renderProfile() {
      const letter = (profile.name || currentUser.email || '?')[0].toUpperCase();
      document.getElementById('avatar-letter').textContent = letter;
      document.getElementById('display-name').textContent  = profile.name || '—';
      document.getElementById('display-email').textContent = currentUser.email || '—';
      if (profile.position) {
        document.getElementById('display-pos-badge').innerHTML =
          `<span class="pos-badge ${POS_CLASS[profile.position]||''}">${POS_LABEL[profile.position]||profile.position}</span>`;
      }
      document.getElementById('v-name').textContent     = profile.name     || '—';
      document.getElementById('v-gender').textContent   = GENDER_LABEL[profile.gender] || '—';
      document.getElementById('v-birth').textContent    = profile.birthdate || '—';
      document.getElementById('v-country').textContent  = profile.country  || '—';
      document.getElementById('v-company').textContent  = profile.company  || '—';
      document.getElementById('v-position').textContent = POS_LABEL[profile.position] || '—';
      document.getElementById('v-joined').textContent   = profile.created_at
        ? new Date(profile.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '—';
      // localStorage更新
      localStorage.setItem('pv_user', JSON.stringify({...profile, email: currentUser.email}));
    }

    function renderReviews(revs) {
      const el = document.getElementById('my-reviews-list');
      if (!revs.length) { el.textContent = '投稿した口コミはありません'; return; }
      el.innerHTML = revs.map(r => `
        <div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
            <span style="font-size:.72rem;background:rgba(245,200,66,.1);color:#f5c842;border:1px solid rgba(245,200,66,.2);padding:2px 9px;border-radius:999px;font-weight:700">${r.airline||'—'}</span>
            <span style="font-size:.72rem;color:#6b7d93">${r.created_at ? new Date(r.created_at).toLocaleDateString('ja-JP') : ''}</span>
          </div>
          <div style="font-size:.82rem;color:#b0c0d4;line-height:1.6">${(r.comment||'').slice(0,80)}${(r.comment||'').length>80?'…':''}</div>
        </div>`).join('');
    }

    function startEdit() {
      document.getElementById('edit-card').style.display = 'block';
      document.getElementById('edit-card').scrollIntoView({behavior:'smooth',block:'nearest'});
      document.getElementById('e-name').value    = profile.name || '';
      document.getElementById('e-birth').value   = profile.birthdate || '';
      document.getElementById('e-country').value = profile.country || '';
      document.getElementById('e-company').value = profile.company || '';
      const g = document.querySelector(`input[name="e-gender"][value="${profile.gender||'male'}"]`);
      if(g) g.checked = true;
      const p = document.querySelector(`input[name="e-pos"][value="${profile.position||'fo'}"]`);
      if(p) p.checked = true;
    }

    function cancelEdit() { document.getElementById('edit-card').style.display='none'; }

    async function saveEdit(e) {
      e.preventDefault();
      const g = document.querySelector('input[name="e-gender"]:checked');
      const p = document.querySelector('input[name="e-pos"]:checked');
      const updates = {
        name:      document.getElementById('e-name').value.trim(),
        gender:    g ? g.value : profile.gender,
        birthdate: document.getElementById('e-birth').value,
        country:   document.getElementById('e-country').value,
        company:   document.getElementById('e-company').value.trim(),
        position:  p ? p.value : profile.position,
      };
      await sb.from('profiles').update(updates).eq('id', currentUser.id);
      profile = {...profile, ...updates};
      renderProfile();
      cancelEdit();
      const toast = document.getElementById('toast');
      toast.style.display='block';
      setTimeout(()=>{toast.style.display='none';}, 2500);
    }

    async function handleLogout() {
      if (!confirm('ログアウトしますか？')) return;
      await sb.auth.signOut();
      localStorage.removeItem('pv_user');
      localStorage.removeItem('pv_unlock_expiry');
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
