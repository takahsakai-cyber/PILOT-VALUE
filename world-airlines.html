{code:'AM',  name:'アエロメヒコ',           en:'Aeromexico',            region:'latam',  color:'#006CB7',salary:'¥1,950万',file:'airlines/aeromexico.html',       flag:'🇲🇽',type:'fsc',taxfree:false,alliance:'スカイチーム'},
{code:'CM',  name:'コパ航空',               en:'Copa Airlines',         region:'latam',  color:'#004A94',salary:'¥2,250万',file:'airlines/copa-airlines.html',    flag:'🇵🇦',type:'fsc',taxfree:false,alliance:'スターアライアンス'},
];

// ── State ──────────────────────────────────────────────────────────
let activeRegion = 'all';
let activeType   = 'all';
let searchQuery  = '';

// Map region → data regions
function getDataRegions(mapRegion){
  return REGION_CFG[mapRegion]?.dataRegions || [];
}

// ── Build region strip ─────────────────────────────────────────────
function buildStrip(){
  const strip = document.getElementById('region-strip');
  Object.entries(REGION_CFG).forEach(([id, cfg])=>{
    const cnt = id==='all' ? AIRLINES.length : AIRLINES.filter(a=>cfg.dataRegions.includes(a.region)).length;
    const btn = document.createElement('div');
    btn.className = 'rstrip-btn' + (id==='all'?' active':'');
    btn.dataset.region = id;
    btn.style.setProperty('--rc', cfg.color);
    if(id==='all') btn.style.background='rgba(245,200,66,.12)', btn.style.borderColor='rgba(245,200,66,.3)', btn.style.color='#f5c842';
    btn.innerHTML = `<span>${cfg.emoji}</span><span>${cfg.label}</span><span style="font-size:.68rem;opacity:.65">${cnt}</span>`;
    btn.addEventListener('click',()=>setRegion(id));
    strip.appendChild(btn);
  });
}

function setRegion(id){
  activeRegion = id;
  // Strip buttons
  document.querySelectorAll('.rstrip-btn').forEach(b=>{
    const active = b.dataset.region === id;
    const rc = REGION_CFG[b.dataset.region]?.color||'#f5c842';
    if(active){
      b.classList.add('active');
      b.style.background=`${rc}18`;
      b.style.borderColor=`${rc}55`;
      b.style.color=rc;
    } else {
      b.classList.remove('active');
      b.style.background='rgba(255,255,255,.04)';
      b.style.borderColor='rgba(255,255,255,.1)';
      b.style.color='#6b7d93';
    }
  });
  // SVG region highlighting
  document.querySelectorAll('.map-region-group').forEach(g=>{
    const rid = g.dataset.region;
    const mapActive = id==='all' || id===rid || (id==='europe' && (rid==='europe'));
    g.querySelectorAll('.rgn').forEach(p=>{
      if(mapActive) p.classList.add('active'); else p.classList.remove('active');
    });
  });
  // Pin groups
  document.querySelectorAll('.pin-group').forEach(pg=>{
    const rid = pg.dataset.region;
    const mapActive = id==='all' || id===rid;
    pg.classList.toggle('active', mapActive);
  });
  render();
}

// ── SVG map interaction ────────────────────────────────────────────
const tooltip = document.getElementById('map-tooltip');

document.querySelectorAll('.map-region-group, .pin-group').forEach(el=>{
  const rid = el.dataset.region;
  const cfg = REGION_CFG[rid];
  if(!cfg) return;

  el.addEventListener('mouseenter', e => {
    const cnt = AIRLINES.filter(a=>cfg.dataRegions.includes(a.region)).length;
    tooltip.textContent = `${cfg.emoji} ${cfg.label}  ${cnt}社`;
    tooltip.style.color = cfg.color;
    tooltip.style.borderColor = cfg.color+'44';
    tooltip.style.opacity='1';
  });
  el.addEventListener('mousemove', e => {
    const rect = document.getElementById('world-svg').getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    tooltip.style.left = x+'px';
    tooltip.style.top  = y+'px';
  });
  el.addEventListener('mouseleave', ()=>{ tooltip.style.opacity='0'; });
  el.addEventListener('click', ()=>{
    // Toggle: if already active, deselect to 'all'
    setRegion(activeRegion === rid ? 'all' : rid);
    // Scroll to grid
    document.getElementById('airline-grid').scrollIntoView({behavior:'smooth',block:'start'});
  });
});

// ── Type filter ────────────────────────────────────────────────────
document.querySelectorAll('.ftype-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    activeType = btn.dataset.type;
    document.querySelectorAll('.ftype-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── Search ─────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  searchQuery = e.target.value.toLowerCase();
  render();
});

// ── Render ─────────────────────────────────────────────────────────
function render(){
  const dataRegions = getDataRegions(activeRegion);
  const filtered = AIRLINES.filter(a=>{
    if(activeRegion!=='all' && !dataRegions.includes(a.region)) return false;
    if(activeType==='fsc' && a.type!=='fsc') return false;
    if(activeType==='lcc' && a.type!=='lcc') return false;
    if(activeType==='taxfree' && !a.taxfree) return false;
    if(searchQuery){
      const hay=(a.name+a.en+a.alliance+a.flag).toLowerCase();
      if(!hay.includes(searchQuery)) return false;
    }
    return true;
  });

  const grid = document.getElementById('airline-grid');
  const noR  = document.getElementById('no-results');
  const cnt  = document.getElementById('result-count');
  grid.innerHTML='';

  if(!filtered.length){
    noR.style.display='block';
    cnt.textContent='';
  } else {
    noR.style.display='none';
    cnt.textContent=`${filtered.length}社`;
    filtered.forEach(a=>grid.appendChild(createCard(a)));
  }
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function createCard(a){
  const wrap=document.createElement('a');
  wrap.href=a.file;
  wrap.className='airline-card';
  wrap.style.setProperty('--ac-rgb', hexToRgb(a.color));
  const typeTag = a.type==='fsc'
    ? `<span class="tag tag-blue">FSC</span>`
    : `<span class="tag tag-orange">LCC</span>`;
  const taxTag = a.taxfree?`<span class="tag tag-gold">免税</span>`:'';
  const alTag  = a.alliance?`<span class="tag tag-gray">${a.alliance}</span>`:'';
  wrap.innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:11px">
      <div class="ac-code" style="background:${a.color}20;color:${a.color};border:1px solid ${a.color}35">${a.code}</div>
      <div style="flex:1;min-width:0">
        <div class="ac-name">${a.flag} ${a.name}</div>
        <div class="ac-en">${a.en}</div>
      </div>
    </div>
    <div style="font-size:.67rem;color:#6b7d93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px">機長年収（参考値）</div>
    <div class="ac-sal" style="color:${a.color}">${a.salary}</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">${typeTag}${taxTag}${alTag}</div>
  `;
  return wrap;
}

// ── Init ───────────────────────────────────────────────────────────
buildStrip();
render();

// Update pin counts
const regionCounts={};
AIRLINES.forEach(a=>{
  regionCounts[a.region]=(regionCounts[a.region]||0)+1;
});
// Map data region to pin element IDs
const pinMap={japan:'pc-japan',us:'pc-us',latam:'pc-latam',africa:'pc-africa',mideast:'pc-mideast',oceania:'pc-oceania',asia:'pc-asia'};
Object.entries(pinMap).forEach(([r,id])=>{
  const el=document.getElementById(id);
  if(el) el.textContent=(regionCounts[r]||0)+'社';
});
// Europe pin
const euEl=document.getElementById('pc-europe');
if(euEl) euEl.textContent=((regionCounts['eu_fsc']||0)+(regionCounts['eu_lcc']||0))+'社';

// Highlight "all" regions as active on load
document.querySelectorAll('.rgn').forEach(p=>p.classList.add('active'));

// Fade-up observer
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});
},{threshold:.01});
document.querySelectorAll('.fade-up').forEach(el=>io.observe(el));
setTimeout(()=>document.querySelectorAll('.fade-up').forEach(el=>el.classList.add('visible')),200);

function applyThemeW(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('pv-theme',t);
  const btn=document.getElementById('theme-toggle');
  if(btn) btn.innerHTML=t==='dark'?SUN_SVG_W:MOON_SVG_W;
}
document.getElementById('theme-toggle').addEventListener('click',function(){
  const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  applyThemeW(next);
});
